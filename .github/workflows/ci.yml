name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['dist/**']
  pull_request:
    branches: [main]
    paths-ignore: ['dist/**']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

  publish-dist:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Commit dist/ if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist
          if git diff --cached --quiet; then
            echo "dist/ unchanged — nothing to commit"
          else
            git commit -m "chore: rebuild dist [skip ci]"
            git push
          fi

      - name: Verify the SSH account and target directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            echo "== whoami / pwd =="
            whoami
            pwd
            echo
            echo "== home directory listing =="
            ls -la ~
            echo
            echo "== ~/public_html listing (if it exists) =="
            ls -la ~/public_html 2>&1 || echo "public_html not found here"
            echo
            echo "== ~/public_html/jansuvidhastudio listing (if it exists) =="
            ls -la ~/public_html/jansuvidhastudio 2>&1 || echo "not found"
            echo
            echo "== current asset hash in that index.html, if present =="
            grep -o 'assets/index-[a-z0-9]*\.\(js\|css\)' ~/public_html/jansuvidhastudio/index.html 2>&1 || echo "index.html not found or no match"
            echo
            echo "== ~/domains listing (if it exists — some Hostinger plans nest docroots here) =="
            find ~/domains -maxdepth 3 2>&1 || echo "no domains folder"

      # FTP from GitHub-hosted runners to Hostinger proved unreliable — the host's
      # firewall appears to throttle/block automated FTP connections from cloud IPs
      # (control-socket timeouts). SSH is not subject to the same restriction.
      - name: Deploy dist/ to Hostinger via SSH (SCP)
        id: ssh-deploy-1
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "dist/*"
          target: "public_html/jansuvidhastudio/"
          strip_components: 1
          overwrite: true

      - name: Retry SSH deploy (attempt 2)
        id: ssh-deploy-2
        if: steps.ssh-deploy-1.outcome == 'failure'
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "dist/*"
          target: "public_html/jansuvidhastudio/"
          strip_components: 1
          overwrite: true

      - name: Retry SSH deploy (attempt 3)
        if: steps.ssh-deploy-1.outcome == 'failure' && steps.ssh-deploy-2.outcome == 'failure'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "dist/*"
          target: "public_html/jansuvidhastudio/"
          strip_components: 1
          overwrite: true
