name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['dist/**']
  pull_request:
    branches: [main]
    paths-ignore: ['dist/**']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

  publish-dist:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Commit dist/ if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist
          if git diff --cached --quiet; then
            echo "dist/ unchanged — nothing to commit"
          else
            git commit -m "chore: rebuild dist [skip ci]"
            git push
          fi

      - name: Discover the live document root on the FTP account
        id: discover
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          CANDIDATES=("" "public_html/" "public_html/jansuvidhastudio/" "domains/mantrikatech.com/public_html/jansuvidhastudio/")
          FOUND=""
          for dir in "${CANDIDATES[@]}"; do
            echo "---- Listing ftp://\$FTP_HOST/$dir ----"
            listing=$(curl -s --connect-timeout 15 --user "$FTP_USERNAME:$FTP_PASSWORD" "ftp://$FTP_HOST/$dir" || true)
            echo "$listing"
            echo
            if echo "$listing" | grep -qi "index.html"; then
              echo "==> index.html found here — using this as the deploy target"
              FOUND="$dir"
              break
            fi
          done
          if [ -z "$FOUND" ] && [ -n "$listing" ]; then
            echo "No candidate matched — defaulting to account root ./"
          fi
          echo "server_dir=./$FOUND" >> "$GITHUB_ENV"

      - name: Deploy dist/ to Hostinger via FTP
        id: ftp-deploy-1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ env.server_dir }}
          log-level: verbose

      # Shared-hosting FTP servers occasionally drop the control connection mid-transfer
      # (ECONNRESET), especially on larger files — retry once or twice before failing the job.
      - name: Retry FTP deploy (attempt 2)
        id: ftp-deploy-2
        if: steps.ftp-deploy-1.outcome == 'failure'
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ env.server_dir }}
          log-level: verbose

      - name: Retry FTP deploy (attempt 3)
        if: steps.ftp-deploy-1.outcome == 'failure' && steps.ftp-deploy-2.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ env.server_dir }}
          log-level: verbose
