name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['dist/**']
  pull_request:
    branches: [main]
    paths-ignore: ['dist/**']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

  publish-dist:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Commit dist/ if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist
          if git diff --cached --quiet; then
            echo "dist/ unchanged — nothing to commit"
          else
            git commit -m "chore: rebuild dist [skip ci]"
            git push
          fi

      # Written into dist/ (never committed — the commit step above already ran) so the
      # deploy step below places it automatically in the same folder as the other PHP
      # files, avoiding manual navigation into the account's folder structure.
      - name: Write Gemini config for deploy
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cat > dist/api/config.local.php <<PHP
          <?php
          return [
              'GEMINI_API_KEY' => '$GEMINI_API_KEY',
          ];
          PHP

      # Matches the proven-working Hostinger deploy pattern from mantrikatech-solutions:
      # explicit ftps + loose security (Hostinger needs this handshake), absolute server-dir.
      - name: Deploy dist/ to Hostinger via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./dist/
          server-dir: /public_html/jansuvidhastudio/
          protocol: ftps
          log-level: standard
          security: loose
          state-name: .ftp-deploy-sync-state.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env*
            **/.DS_Store
